plugins {
    id 'java'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.0.145'
}

version = '1.0.0'
group = 'com.neobot'

base {
    archivesName = 'neobot-framework'
}

// NeoForge 配置
// Minecraft 1.21.1 使用 Java 21
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// Gradle 配置
gradle {
    // 禁止不兼容的 Gradle 功能
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

minecraft {
    // NeoForge 版本映射
    // 1.21.1 对应的 NeoForge 版本
    mappings {
        channel = 'official'
        version = '1.21.1'
    }
    
    // 访问转换器 - 允许访问私有成员
    accessTransformers {
        file('src/main/resources/META-INF/accesstransformer.cfg')
    }
}

dependencies {
    // NeoForge 运行时 - 1.21.1 版本
    implementation "net.neoforged:neoforge:21.1.77"
    
    // 测试依赖
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// 任务配置
tasks.named('jar', Jar).configure {
    manifest {
        attributes([
            'Specification-Title'     : 'NeoBot Framework',
            'Specification-Vendor'    : 'NeoBot Team',
            'Specification-Version'   : '1',
            'Implementation-Title'    : project.name,
            'Implementation-Version'  : project.jar.archiveVersion.get(),
            'Implementation-Vendor'   : 'NeoBot Team',
            'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
            'Main-Class'              : 'com.neobot.NeoBot'
        ])
    }
    
    // 将依赖打包进 jar
    from {
        configurations.runtimeClasspath.collect { it.isDirectory() ? it : zipTree(it) }
    }
    
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

// Java 编译选项
tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
    
    // 启用预览功能（如果需要）
    // options.compilerArgs += ['--enable-preview']
}

// Javadoc 配置
tasks.named('javadoc', Javadoc).configure {
    options {
        encoding = 'UTF-8'
        charSet = 'UTF-8'
        author = true
        version = true
        links = ['https://docs.oracle.com/en/java/javase/21/docs/api/']
    }
}

// 测试配置
tasks.named('test', Test).configure {
    useJUnitPlatform()
    
    // JVM 参数
    jvmArgs += [
        '--enable-preview',
        '-Xmx2G'
    ]
    
    // 测试输出
    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = true
    }
}

// 资源处理
tasks.named('processResources', ProcessResources).configure {
    inputs.property('version', project.version)
    inputs.property('minecraft_version', '1.21.1')
    
    filesMatching('META-INF/neoforge.mods.toml') {
        expand version: project.version,
               minecraft_version: '1.21.1'
    }
}

// 发布配置
publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            
            pom {
                name = 'NeoBot Framework'
                description = 'A Minecraft bot framework based on NeoForge, inspired by Altoclef'
                url = 'https://github.com/neobot/neobot-framework'
                
                licenses {
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                    }
                }
                
                developers {
                    developer {
                        id = 'neobot'
                        name = 'NeoBot Team'
                    }
                }
            }
        }
    }
    
    repositories {
        maven {
            name = 'GitHubPackages'
            url = uri('https://github.com/neobot/neobot-framework/packages')
            credentials {
                username = project.findProperty('gpr.user') ?: System.getenv('GITHUB_ACTOR')
                password = project.findProperty('gpr.token') ?: System.getenv('GITHUB_TOKEN')
            }
        }
    }
}
