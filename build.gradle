plugins {
    id 'java'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.0.145'
}

version = '1.0.0'
group = 'com.ragenc'
base {
    archivesName = 'ragenc'
}

// NeoForge 配置
// Minecraft 1.21.1 使用 Java 21
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

// Gradle 配置
gradle {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

minecraft {
    // NeoForge 版本映射
    mappings {
        channel = 'official'
        version = '1.21.1'
    }

    // 访问转换器
    accessTransformers {
        file('src/main/resources/META-INF/accesstransformer.cfg')
    }
}

dependencies {
    implementation "net.neoforged:neoforge:21.1.77"
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

tasks.named('jar', Jar).configure {
    manifest {
        attributes([
            'Specification-Title'     : 'RageNC',
            'Specification-Vendor'    : 'RageNC Team',
            'Specification-Version'   : '1',
            'Implementation-Title'    : project.name,
            'Implementation-Version'  : project.jar.archiveVersion.get(),
            'Implementation-Vendor'   : 'RageNC Team',
            'Implementation-Timestamp': new Date().format("yyyy-MM-dd'T'HH:mm:ssZ"),
            'Main-Class'              : 'com.ragenc.RageNC'
        ])
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
}

tasks.named('javadoc', Javadoc).configure {
    options {
        encoding = 'UTF-8'
        charSet = 'UTF-8'
        author = true
        version = true
        links = ['https://docs.oracle.com/en/java/javase/21/docs/api/']
    }
}

tasks.named('test', Test).configure {
    useJUnitPlatform()
    jvmArgs += ['--enable-preview', '-Xmx2G']
    testLogging {
        events 'passed', 'skipped', 'failed'
        showStandardStreams = true
    }
}

tasks.named('processResources', ProcessResources).configure {
    inputs.property('version', project.version)
    inputs.property('minecraft_version', '1.21.1')
    filesMatching('META-INF/neoforge.mods.toml') {
        expand version: project.version, minecraft_version: '1.21.1'
    }
}

publishing {
    publications {
        mavenJava(MavenPublication) {
            from components.java
            pom {
                name = 'RageNC'
                description = 'A Minecraft bot framework based on NeoForge, inspired by Altoclef'
                url = 'https://github.com/SleepyRinu/ragenc'
                licenses {
                    license {
                        name = 'MIT License'
                        url = 'https://opensource.org/licenses/MIT'
                    }
                }
                developers {
                    developer {
                        id = 'ragenc'
                        name = 'RageNC Team'
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = 'GitHubPackages'
            url = uri('https://github.com/SleepyRinu/ragenc/packages')
            credentials {
                username = project.findProperty('gpr.user') ?: System.getenv('GITHUB_ACTOR')
                password = project.findProperty('gpr.token') ?: System.getenv('GITHUB_TOKEN')
            }
        }
    }
}
