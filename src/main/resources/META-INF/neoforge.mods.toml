# RageNC Mod Configuration
# 基于 NeoForge 的 Minecraft 机器人框架

modId = "ragenc"
version = "${version}"
displayName = "RageNC"
authors = "RageNC Team"
description = '''
A Minecraft bot framework based on NeoForge, inspired by Altoclef.

Features:
- Task-based bot behavior system
- Flexible task chaining and execution
- Event-driven architecture
- Built-in trackers for entities, blocks, and items
- Command execution system
'''

[[mixins]]
config = "ragenc.mixins.json"

[[dependencies.ragenc]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "BOTH"

[[dependencies.ragenc]]
modId = "neoforge"
type = "required"
versionRange = "[21.1.77,)"
ordering = "NONE"
side = "BOTH"

[[entrypoints]]
type = "main"
value = "com.ragenc.RageNC"
